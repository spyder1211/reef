appId: com.spyder1211.reef
# productName は package.json の "Reef" を使う（.app / .dmg 名に反映される）
directories:
  output: dist
  buildResources: build
# electron-vite の成果物（out/）とエントリ参照用の package.json を同梱する。
# mysql2 などの dependencies は electron-builder が自動でバンドルする。
files:
  - out/**/*
  - package.json
# パック後にバンドル全体を ad-hoc 署名し直す（未署名配布時の「壊れている」エラー緩和）。
afterPack: build/afterPack.cjs
mac:
  target:
    - dmg
  # アプリアイコン。build/ は buildResources なので自動検出もされるが明示する。
  icon: build/icon.icns
  category: public.app-category.developer-tools
  # デフォルトは未署名（開発ビルド）。release:mac が CLI で Developer ID に上書きする。
  identity: null
  # 公証の必須要件。署名するときだけ意味を持つ（未署名ビルドには影響しない）。
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # デフォルトは公証しない。release:mac が --config.mac.notarize=true で上書きする。
  notarize: false
# 未署名 .app の Gatekeeper 隔離属性を付けない（ローカル起動時の警告を軽減）
dmg:
  writeUpdateInfo: false
