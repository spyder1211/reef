appId: com.spyder1211.tableplus
# productName は package.json の "Table++" を使う（.app / .dmg 名に反映される）
directories:
  output: dist
  buildResources: build
# electron-vite の成果物（out/）とエントリ参照用の package.json を同梱する。
# mysql2 などの dependencies は electron-builder が自動でバンドルする。
files:
  - out/**/*
  - package.json
# パック後にバンドル全体を ad-hoc 署名し直す（未署名配布時の「壊れている」エラー緩和）。
afterPack: build/afterPack.cjs
mac:
  target:
    - dmg
  # アプリアイコン。build/ は buildResources なので自動検出もされるが明示する。
  icon: build/icon.icns
  # 署名なし。arm64 でローカル実行できるよう electron-builder が ad-hoc 署名を行う。
  identity: null
  category: public.app-category.developer-tools
# 未署名 .app の Gatekeeper 隔離属性を付けない（ローカル起動時の警告を軽減）
dmg:
  writeUpdateInfo: false
